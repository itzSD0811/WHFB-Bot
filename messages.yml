# Customizable messages for the bot

# Message sent to the bot's own number when it starts up successfully
bot_started: "Bot successfully started! 🚀"
bot_stopped: "Bot is stopping... Goodbye! 👋"

# Footer to be added to all posts
footer_line1: "Posted via WHFB Bot"
footer_line2: "Automation by ItzSD"
footer_line3: ""

# --- Facebook Posting Flow Messages ---
ask_media: "Please send the photo(s) you want to post. When you have sent all of them, reply with `{PREFIX}done`."
ask_media_simple: "Please send the photo(s) you want to post. When ready, simply send your text description to post instantly! ⚡"
media_received: "📸 {COUNT} image(s) received. Reply `{PREFIX}done` to continue or send more photos."
media_received_simple: "📸 {COUNT} image(s) received. Send more photos, or send your text description to post instantly! ⚡"
confirm_media: "You have {COUNT} image(s) ready to post.\nConfirm with `{PREFIX}yes` or cancel with `{PREFIX}no`."
ask_description: "Great! Now please send the text description for your post."
ask_final_confirmation: "Almost ready! {COUNT} photo(s) attached.\n\n*Preview:*\n{TEXT}\n\nReply with `{PREFIX}yes` to post or `{PREFIX}no` to cancel."
post_success: "Successfully posted to Facebook! 🎉"
post_failed: "Failed to post to Facebook. Error: {ERROR}"
post_cancelled: "Post cancelled."
session_cancelled: "All active sessions for your number have been terminated."
request_timeout: "Request timed out. Please start over."

# --- OTP / Access System Messages ---
otp_request_active: "You already have an active request. Please check with the owner."
otp_owner_request: "🔔 *Access Request*\nUser: {NAME}\nID: {ID}\n\nOTP Code: *{OTP}*"
otp_request_timeout: "Your OTP request timed out. Please send `{PREFIX}request` again."
otp_request_sent: "Request sent to the owner! Please enter the 6-digit OTP to get access (expires in 1 minute)."
otp_granted: "✅ Access Granted! You can now use the bot. Send `{PREFIX}start`"
otp_owner_granted: "✅ *Access Granted*\nUser *{NAME}* successfully entered the OTP.\n\n_Note: If you want to remove this user later, simply delete their line from whitelist.yml_"
otp_invalid: "❌ Invalid OTP. Try again. ({ATTEMPTS} attempts remaining)"
otp_max_attempts: "❌ Too many invalid attempts. Your request has been cancelled for security."

# --- Misc Messages ---
invalid_description: "Please send a valid text description."
uploading_to_fb: "Uploading to Facebook... Please wait ⏳"
fb_not_configured: "Facebook credentials are not configured in config.yml!"
